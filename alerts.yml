# ============================================================
# SCORCHED — Prometheus Alert Rules
# ============================================================

groups:
  - name: scorched
    rules:
      # Indexer health
      - alert: IndexerDown
        expr: up{job="scorched-indexer"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Scorched indexer is down"
          description: "The indexer has been down for more than 1 minute. X Layer events are not being processed."

      # API health
      - alert: APIDown
        expr: up{job="scorched-api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Scorched API is down"
          description: "The API server is not responding."

      # Block lag
      - alert: IndexerBlockLag
        expr: scorched_indexer_block_lag > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Indexer is falling behind"
          description: "The indexer is {{ $value }} blocks behind X Layer head."

      # Database connections
      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL has {{ $value }} active connections."

      # Redis memory
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using {{ $value | humanizePercentage }} of available memory."

      # API error rate
      - alert: APIHighErrorRate
        expr: rate(scorched_api_requests_total{status=~"5.."}[5m]) / rate(scorched_api_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API high error rate"
          description: "API error rate is {{ $value | humanizePercentage }}."
